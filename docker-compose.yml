services:
  wishlist-api:
    build: .
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_PATH: /app/data/wishlist.json
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      OZON_BROWSER_PROFILE_PATH: /app/browser-profile
      OZON_COOKIE: ${OZON_COOKIE:-}
    volumes:
      - wishlist-data:/app/data
      - wishlist-browser-profile:/app/browser-profile

volumes:
  wishlist-data:
  wishlist-browser-profile:
